<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="ques3_24.css">
    <script src="ques3_24.js" defer></script>
</head>
<body>
    <h1>Mr. Surname Blender</h1>
    <div>
        <span>Surname:</span>
        <input id="surname" type="text" size="20" />
    </div>

    <div>
        <span>Font:</span>
        <select id="font">
            <option>Arial</option>
            <option>Comic Sans MS</option>
            <option>Times New Roman</option>
        </select>
        <select id="color">
            <option>Black</option>
            <option>Green</option>
            <option>Red</option>
            <option>Blue</option>
        </select>
    </div>
    <div>
        <label>Font Size</label>
        <input type="text", placeholder="Font Size", value="16", id="fontWei">
    </div>

    <div>
        <span>Position:</span>
        <input id="sequential" surname="pos" type="radio" value="seq" checked="checked" />Sequential
        <input id="random" surname="pos" type="radio" value="rand" />Random
        <input id="reverse" surname="pos" type="radio" value="rev" />Reverse
    </div>
</body>
</html>
