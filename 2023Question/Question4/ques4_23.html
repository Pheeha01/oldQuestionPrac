<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="ques4_23.css">
    <script src="ques4_23.js" defer></script>
</head>
<body>
    <div>
        <h1>Pace a Runner</h1>
        <div id="theSystem">
            <fieldset id="inforPace">
                <legend>Calculate Pace Chart</legend>
                <div id="content">
                    <p>Runner's Name</p>
                    <input type="text" id="RunnerName">
                    <p>Runner's Age</p>
                    <input type="text" id="RunnerAge">
                    <p>Distance</p>
                    <input type="text" id="Distance">km
                    <p>Target Pace</p>
                    <input type="text" id="targetPace">min\km
                    <p id="time">(mm:ss)</p>
                    <button id="Calculate">Calculate</button>
                </div>
            </fieldset>
            <p style="font-weight: bolder;">Kilometer Time</p>
        </div>
        <div>
            <table id="paceTable">
                <thead>
                    <tr>
                        <th>Kilometers</th>
                        <th>Pace p/km</th>
                    </tr>
                </thead>
                <tbody>
                    
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
